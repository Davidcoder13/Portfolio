<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini NN Widget</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.0.0"></script>

<style>
body {
  margin: 0;
  background: #0d0f14;
  font-family: system-ui;
  color: white;
  text-align: center;
}

.widget {
  padding: 10px;
  width: fit-content;
  margin: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(24, 12px);
  grid-template-rows: repeat(24, 12px);
  gap: 1px;
  background: #222;
  padding: 4px;
  border-radius: 6px;
}

.cell {
  width: 12px;
  height: 12px;
  background: black;
  cursor: pointer;
}

.controls {
  margin-top: 8px;
}

button {
  padding: 4px 8px;
  margin: 4px;
  border: none;
  border-radius: 4px;
  background: #2b7cff;
  color: white;
  cursor: pointer;
  font-size: 12px;
}

.prediction {
  margin-top: 6px;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="widget">
  <div class="grid" id="grid"></div>

  <div class="controls">
    <button onclick="predict()">Predict</button>
    <button onclick="clearGrid()">Clear</button>
  </div>

  <div class="prediction" id="prediction">?</div>
</div>

<script>
const grid = document.getElementById("grid");
let drawing = false;
let model;

const SIZE = 24;
let pixels = Array(SIZE).fill().map(() => Array(SIZE).fill(0));

// Create grid
for (let y = 0; y < SIZE; y++) {
  for (let x = 0; x < SIZE; x++) {
    const cell = document.createElement("div");
    cell.className = "cell";

    cell.addEventListener("mousedown", () => {
      drawing = true;
      togglePixel(x, y, cell);
    });

    cell.addEventListener("mouseover", () => {
      if (drawing) togglePixel(x, y, cell);
    });

    grid.appendChild(cell);
  }
}

document.body.addEventListener("mouseup", () => drawing = false);

function togglePixel(x, y, cell) {
  pixels[y][x] = 1;
  cell.style.background = "white";
}

function clearGrid() {
  pixels = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
  document.querySelectorAll(".cell").forEach(c => c.style.background = "black");
  document.getElementById("prediction").innerText = "?";
}

// Load MNIST model
async function loadModel() {
  model = await tf.loadLayersModel(
    "https://storage.googleapis.com/tfjs-models/tfjs/mnist/model.json"
  );
}
loadModel();

function preprocess() {
  return tf.tidy(() => {
    let tensor = tf.tensor(pixels)
      .expandDims(-1)
      .resizeBilinear([28, 28])
      .expandDims(0)
      .toFloat();

    return tensor;
  });
}

async function predict() {
  if (!model) return;

  const tensor = preprocess();
  const prediction = model.predict(tensor);
  const probs = await prediction.data();

  const maxIndex = probs.indexOf(Math.max(...probs));
  document.getElementById("prediction").innerText = maxIndex;

  tensor.dispose();
  prediction.dispose();
}
</script>

</body>
</html>
